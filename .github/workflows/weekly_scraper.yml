name: 每週監理報告自動抓取

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:
  push:
    branches:
      - claude/regulatory-reports-redesign-21aogs  # 暫時：分支端到端測試用，合併前移除

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEBUG_PCAOB: "1"   # 暫時：診斷新聞發布頁結構，驗證後移除
        run: python scraper/scraper.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports.json
          git diff --staged --quiet || git commit -m "📋 自動更新：$(date '+%Y-%m-%d %H:%M') 監理報告清單"
          git push
