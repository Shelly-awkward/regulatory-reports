<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>監理報告週報</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #1a1a2e;
    --paper:  #f5f0e8;
    --accent: #c4392a;
    --gold:   #b8860b;
    --muted:  #7a7060;
    --line:   #d4cdc0;
    --white:  #fdfaf5;
    --green:  #2d6a4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 22px 40px 18px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    border-bottom: 4px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.04em; }
  header p  { font-size: 0.72rem; color: #9fa8b0; margin-top: 4px; font-family: 'DM Mono', monospace; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .last-updated { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: #8fa0b0; }

  .btn {
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    letter-spacing: 0.05em; padding: 8px 14px;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #a02f22; }
  .btn-outline { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-outline:hover { background: var(--line); }
  header .btn-outline { color: var(--paper); border-color: #4a4a60; }
  header .btn-outline:hover { background: #2c2c44; }

  /* ── Layout ── */
  .layout { display: flex; min-height: calc(100vh - 76px); }

  /* ── Sidebar ── */
  aside {
    width: 250px;
    flex-shrink: 0;
    background: var(--white);
    border-right: 1px solid var(--line);
    padding: 24px 18px;
    position: sticky;
    top: 76px;
    height: calc(100vh - 76px);
    overflow-y: auto;
  }
  .sidebar-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .filter-section { margin-bottom: 24px; }

  .source-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid var(--line);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.76rem;
    color: var(--muted);
    margin-bottom: 4px;
    transition: all 0.15s;
    text-align: left;
  }
  .source-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .source-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .source-btn .cnt { margin-left: auto; font-size: 0.66rem; opacity: 0.6; }

  .date-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .date-row input[type="date"] {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid var(--line);
    background: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink);
    outline: none;
    min-width: 0;
  }
  .date-row input:focus { border-color: var(--gold); }
  .date-sep { font-size: 0.7rem; color: var(--muted); }

  input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    background: var(--paper);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--gold); }

  .custom-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    background: var(--paper);
    border: 1px solid var(--line);
    margin-bottom: 5px;
    font-size: 0.73rem;
    font-family: 'DM Mono', monospace;
  }
  .custom-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .custom-item button {
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 1rem; line-height: 1; padding: 0 2px;
  }
  .add-custom-row { display: flex; gap: 5px; margin-top: 8px; }
  .add-custom-row input { flex: 1; font-size: 0.72rem; }
  .btn-mini {
    padding: 6px 10px;
    background: var(--ink); color: var(--paper);
    border: none; cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    white-space: nowrap;
  }
  .btn-mini:hover { background: var(--accent); }

  /* ── Main ── */
  main {
    flex: 1;
    padding: 26px 36px 60px;
    min-width: 0;
    max-width: 1100px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .result-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.73rem;
    color: var(--muted);
  }
  .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  .view-toggle { display: flex; border: 1px solid var(--line); }
  .view-toggle button {
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    padding: 7px 14px; border: none; cursor: pointer;
    background: transparent; color: var(--muted);
  }
  .view-toggle button.active { background: var(--ink); color: var(--paper); }

  /* ── Source badges ── */
  .src-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    background: #555; color: #fff;
    padding: 2px 7px; letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .src-IOSCO { background: #1a3a5c; }
  .src-IESBA { background: #2d4a1e; }
  .src-IAASB { background: #5c3a1a; }
  .src-FSB   { background: #3a1a2e; }
  .src-IFAC  { background: #3a2a1a; }
  .src-IFIAR { background: #1a4444; }
  .src-PCAOB { background: #44245c; }

  .new-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace; font-size: 0.6rem;
    background: var(--accent); color: #fff;
    padding: 2px 6px; letter-spacing: 0.08em;
    animation: none;
  }

  /* ── Card view ── */
  .group-heading {
    font-family: 'DM Mono', monospace;
    font-size: 0.76rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 30px 0 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--ink);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .group-heading:first-child { margin-top: 0; }
  .group-heading .g-cnt { font-size: 0.66rem; opacity: 0.6; }

  .card {
    background: var(--white);
    border: 1px solid var(--line);
    border-left: 3px solid var(--ink);
    padding: 16px 20px;
    margin-bottom: 12px;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 10px rgba(26,26,46,0.08); }
  .card-meta {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted);
  }
  .card-title-en {
    font-size: 0.98rem; font-weight: 600; line-height: 1.5;
    margin-bottom: 3px;
  }
  .card-title-en a { color: var(--ink); text-decoration: none; }
  .card-title-en a:hover { color: var(--accent); text-decoration: underline; }
  .card-title-zh {
    font-size: 0.9rem; font-weight: 600; color: var(--gold);
    line-height: 1.55; margin-bottom: 6px;
  }
  .card-intro {
    font-size: 0.84rem; color: #444; line-height: 1.7;
  }

  /* ── Table view ── */
  .table-wrap { overflow-x: auto; background: var(--white); border: 1px solid var(--line); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 3px solid var(--ink); }
  th {
    background: var(--ink); color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 14px; text-align: left; font-weight: 500;
    white-space: nowrap;
  }
  td {
    padding: 13px 14px; border-bottom: 1px solid var(--line);
    vertical-align: top; font-size: 0.84rem; line-height: 1.65;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f8f3ea; }
  td.col-src   { white-space: nowrap; }
  td.col-en    { width: 30%; }
  td.col-zh    { width: 22%; font-weight: 600; color: var(--ink); }
  td.col-intro { width: 36%; color: #444; }
  td.col-date  { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); white-space: nowrap; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  td.col-en a { color: var(--ink); }
  td.col-en a:hover { color: var(--accent); }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 0.9rem;
    border: 1px dashed var(--line); background: var(--white);
  }
  .empty-state .icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }

  .loading {
    text-align: center; padding: 60px;
    font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted);
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-top: 4px solid var(--gold);
    padding: 28px 32px;
    width: 460px; max-width: 90vw;
  }
  .modal h3 { font-size: 1rem; margin-bottom: 18px; }
  .modal label { display: block; font-size: 0.73rem; color: var(--muted); margin-bottom: 5px; font-family: 'DM Mono', monospace; }
  .modal input { width: 100%; margin-bottom: 14px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
  .btn-cancel { background: transparent; border: 1px solid var(--line); color: var(--muted); }
  .btn-cancel:hover { background: var(--line); }

  /* ── Responsive ── */
  @media (max-width: 860px) {
    .layout { flex-direction: column; }
    aside {
      width: 100%; position: static; height: auto;
      border-right: none; border-bottom: 1px solid var(--line);
      display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px;
      padding: 16px 20px;
    }
    aside .filter-section { margin-bottom: 14px; }
    main { padding: 20px 16px 50px; }
    header { padding: 16px 20px 14px; }
    td.col-intro { display: none; }
    th:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📋 監理報告週報</h1>
    <p id="sourceLine">每週自動更新 · 中英對照</p>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">載入中…</span>
    <button class="btn btn-outline" onclick="triggerAction()">▶ 立即重跑</button>
    <button class="btn btn-primary" onclick="exportHTML()">↓ 匯出</button>
  </div>
</header>

<div class="layout">

  <aside>
    <div class="filter-section">
      <div class="sidebar-title">關鍵字搜尋</div>
      <input type="text" id="searchInput" placeholder="輸入標題或摘要關鍵字…" oninput="applyFilters()">
    </div>

    <div class="filter-section">
      <div class="sidebar-title">來源</div>
      <div id="sourceFilters"></div>
    </div>

    <div class="filter-section">
      <div class="sidebar-title">發布日期範圍</div>
      <div class="date-row">
        <input type="date" id="dateFrom" onchange="applyFilters()">
        <span class="date-sep">—</span>
        <input type="date" id="dateTo" onchange="applyFilters()">
      </div>
    </div>

    <div class="filter-section">
      <div class="sidebar-title">自訂搜尋網站</div>
      <div id="customList"></div>
      <div class="add-custom-row">
        <input type="text" id="newSourceInput" placeholder="貼上網址…">
        <button class="btn-mini" onclick="openAddModal()">＋ 新增</button>
      </div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <span class="result-count" id="resultCount">載入中…</span>
      <div class="toolbar-right">
        <button class="btn btn-outline" onclick="clearFilters()">清除篩選</button>
        <div class="view-toggle">
          <button id="viewCardBtn" onclick="setView('card')">🗂 卡片</button>
          <button id="viewTableBtn" onclick="setView('table')">☰ 表格</button>
        </div>
      </div>
    </div>

    <div class="loading" id="loadingState">⏳ 資料載入中…</div>

    <div id="cardView" style="display:none"></div>

    <div class="table-wrap" id="tableView" style="display:none">
      <table>
        <thead>
          <tr>
            <th>來源</th>
            <th>英文標題</th>
            <th>中文標題</th>
            <th>簡介</th>
            <th>發布日期</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
      <span class="icon">📭</span>
      目前沒有符合條件的報告
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>新增自訂搜尋網站</h3>
    <label>機構名稱（簡稱）</label>
    <input type="text" id="modalName" placeholder="例：SEC">
    <label>出版品頁面網址</label>
    <input type="text" id="modalUrl" placeholder="例：https://www.sec.gov/litigation/litreleases">
    <label>機構全名（選填）</label>
    <input type="text" id="modalFullname" placeholder="例：美國證券交易委員會">
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmAddSource()">確認新增</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let allReports   = [];
let sourcesMeta  = {};
let activeSource = "ALL";
let lastBatch    = "";
let viewMode     = localStorage.getItem("viewMode") || "card";

const KNOWN_SOURCES = ["IOSCO","FSB","IFIAR","IESBA","IAASB","IFAC","PCAOB"];
const SRC_COLORS = {
  IOSCO:"#1a3a5c", IESBA:"#2d4a1e", IAASB:"#5c3a1a", FSB:"#3a1a2e",
  IFAC:"#3a2a1a", IFIAR:"#1a4444", PCAOB:"#44245c",
};

// ── Date helpers ──
// 資料日期可能是 YYYY-MM-DD / YYYY-MM / YYYY / 空字串；補齊後才能比較
function padDate(d, endOfRange) {
  if (!d) return "";
  const parts = d.split("-");
  while (parts.length < 3) parts.push(endOfRange ? (parts.length === 1 ? "12" : "31") : "01");
  return parts.map((p, i) => i === 0 ? p : p.padStart(2, "0")).join("-");
}
function sortKey(r) {
  return padDate(r.date || "", false) || "0000-00-00";
}

// ── Load ──
async function loadData() {
  try {
    const resp = await fetch(`data/reports.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error("無法讀取資料");
    const data = await resp.json();

    allReports  = (data.reports || []).map(r => ({
      ...r,
      date: r.date || r.date_raw || "",   // 相容舊 schema
    }));
    sourcesMeta = data.sources_meta || {};
    lastBatch   = data.last_batch || "";

    allReports.sort((a, b) => sortKey(b).localeCompare(sortKey(a)));

    const lu = data.last_updated || "";
    document.getElementById("lastUpdated").textContent = lu ? `上次更新：${lu}` : "尚未執行";
    document.getElementById("sourceLine").textContent =
      Object.keys(sourcesMeta).join(" · ") + " — 每週自動更新 · 中英對照";

    buildSourceFilters();
    setView(viewMode, true);
    applyFilters();
    document.getElementById("loadingState").style.display = "none";
  } catch (e) {
    document.getElementById("loadingState").textContent = "⚠️ 資料讀取失敗，請確認 data/reports.json 是否存在";
  }
}

// ── Source filters ──
function buildSourceFilters() {
  const container = document.getElementById("sourceFilters");
  container.innerHTML = "";
  const counts = {};
  for (const r of allReports) counts[r.source] = (counts[r.source] || 0) + 1;

  const mk = (id, label, count, color) => {
    const btn = document.createElement("button");
    btn.className = "source-btn" + (activeSource === id ? " active" : "");
    btn.id = `srcbtn-${id}`;
    btn.innerHTML = `<span class="dot" style="background:${color}"></span> ${label} <span class="cnt">${count}</span>`;
    btn.onclick = () => setSource(id);
    container.appendChild(btn);
  };

  mk("ALL", "全部", allReports.length, "#888");
  const order = [...new Set([...Object.keys(sourcesMeta), ...allReports.map(r => r.source)])];
  for (const src of order) {
    const meta = sourcesMeta[src] || { name: src };
    mk(src, meta.name, counts[src] || 0, SRC_COLORS[src] || "#555");
  }
}

function setSource(src) {
  activeSource = src;
  document.querySelectorAll(".source-btn").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById(`srcbtn-${src}`);
  if (btn) btn.classList.add("active");
  applyFilters();
}

// ── Filters ──
function currentFiltered() {
  const keyword  = document.getElementById("searchInput").value.trim().toLowerCase();
  const dateFrom = document.getElementById("dateFrom").value;
  const dateTo   = document.getElementById("dateTo").value;

  let filtered = allReports;
  if (activeSource !== "ALL") filtered = filtered.filter(r => r.source === activeSource);
  if (keyword) {
    filtered = filtered.filter(r =>
      (r.title_en || "").toLowerCase().includes(keyword) ||
      (r.title_zh || "").toLowerCase().includes(keyword) ||
      (r.intro    || "").toLowerCase().includes(keyword)
    );
  }
  if (dateFrom || dateTo) {
    filtered = filtered.filter(r => {
      if (!r.date) return false;                     // 篩日期時排除無日期項目
      const lo = padDate(r.date, false), hi = padDate(r.date, true);
      if (dateFrom && hi < dateFrom) return false;
      if (dateTo && lo > dateTo) return false;
      return true;
    });
  }
  return filtered;
}

function applyFilters() {
  const filtered = currentFiltered();
  if (viewMode === "card") renderCards(filtered);
  else renderTable(filtered);
  document.getElementById("resultCount").textContent =
    `顯示 ${filtered.length} 則（共 ${allReports.length} 則）`;
  document.getElementById("emptyState").style.display = filtered.length ? "none" : "";
}

function clearFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("dateFrom").value    = "";
  document.getElementById("dateTo").value      = "";
  setSource("ALL");
}

// ── View toggle ──
function setView(mode, skipRender) {
  viewMode = mode;
  localStorage.setItem("viewMode", mode);
  document.getElementById("viewCardBtn").classList.toggle("active", mode === "card");
  document.getElementById("viewTableBtn").classList.toggle("active", mode === "table");
  document.getElementById("cardView").style.display  = mode === "card"  ? "" : "none";
  document.getElementById("tableView").style.display = mode === "table" ? "" : "none";
  if (!skipRender) applyFilters();
}

// ── Grouping ──
function groupLabel(r, now) {
  if (!r.date) return "日期不明";
  const d = new Date(padDate(r.date, false));
  const diffDays = (now - d) / 86400000;
  if (diffDays <= 7 && diffDays >= -30) return "本週";
  if (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth()) return "本月";
  return `${d.getFullYear()} 年 ${d.getMonth() + 1} 月`;
}

// ── Render: cards ──
function renderCards(reports) {
  const container = document.getElementById("cardView");
  if (!reports.length) { container.innerHTML = ""; return; }

  const now = new Date();
  const groups = [];
  const seen = new Map();
  for (const r of reports) {
    const label = groupLabel(r, now);
    if (!seen.has(label)) { seen.set(label, []); groups.push(label); }
    seen.get(label).push(r);
  }
  // 「日期不明」固定排最後
  const ordered = groups.filter(g => g !== "日期不明");
  if (seen.has("日期不明")) ordered.push("日期不明");

  container.innerHTML = ordered.map(label => {
    const items = seen.get(label);
    const cards = items.map(r => {
      const isNew = lastBatch && r.first_seen === lastBatch;
      const zh    = r.title_zh ? `<div class="card-title-zh">${esc(r.title_zh)}</div>` : "";
      const intro = r.intro    ? `<div class="card-intro">${esc(r.intro)}</div>` : "";
      const title = r.url
        ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title_en)}</a>`
        : esc(r.title_en);
      return `<div class="card" style="border-left-color:${SRC_COLORS[r.source] || '#555'}">
        <div class="card-meta">
          <span class="src-badge src-${esc(r.source)}">${esc(r.source)}</span>
          ${isNew ? '<span class="new-badge">NEW</span>' : ""}
          <span>${esc(r.date || "—")}</span>
        </div>
        <div class="card-title-en">${title}</div>
        ${zh}${intro}
      </div>`;
    }).join("");
    return `<div class="group-heading">${esc(label)} <span class="g-cnt">${items.length} 則</span></div>${cards}`;
  }).join("");
}

// ── Render: table ──
function renderTable(reports) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = reports.map(r => {
    const isNew = lastBatch && r.first_seen === lastBatch;
    const en = r.url
      ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title_en)}</a>`
      : esc(r.title_en);
    return `<tr>
      <td class="col-src"><span class="src-badge src-${esc(r.source)}">${esc(r.source)}</span>${isNew ? ' <span class="new-badge">NEW</span>' : ""}</td>
      <td class="col-en">${en}</td>
      <td class="col-zh">${esc(r.title_zh || "")}</td>
      <td class="col-intro">${esc(r.intro || "")}</td>
      <td class="col-date">${esc(r.date || "")}</td>
    </tr>`;
  }).join("");
}

// ── Custom sources（localStorage）──
function loadCustomSources() {
  try { return JSON.parse(localStorage.getItem("customSources") || "[]"); }
  catch { return []; }
}
function saveCustomSources(list) {
  localStorage.setItem("customSources", JSON.stringify(list));
}
function renderCustomList() {
  const list = loadCustomSources();
  const container = document.getElementById("customList");
  if (!list.length) {
    container.innerHTML = `<div style="font-size:0.73rem;color:var(--muted);padding:4px 0">尚未新增自訂網站</div>`;
    return;
  }
  container.innerHTML = list.map((s, i) => `
    <div class="custom-item">
      <span title="${esc(s.url)}">${esc(s.name)}</span>
      <button onclick="removeCustomSource(${i})" title="移除">✕</button>
    </div>`).join("");
}
function removeCustomSource(idx) {
  const list = loadCustomSources();
  list.splice(idx, 1);
  saveCustomSources(list);
  renderCustomList();
}

// ── Modal ──
function openAddModal() {
  const url = document.getElementById("newSourceInput").value.trim();
  if (url) document.getElementById("modalUrl").value = url;
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  ["modalName","modalUrl","modalFullname","newSourceInput"].forEach(id =>
    document.getElementById(id).value = "");
}
function confirmAddSource() {
  const name     = document.getElementById("modalName").value.trim();
  const url      = document.getElementById("modalUrl").value.trim();
  const fullname = document.getElementById("modalFullname").value.trim();
  if (!name || !url) { alert("機構名稱和網址為必填"); return; }
  if (!url.startsWith("http")) { alert("請輸入完整網址（含 https://）"); return; }

  const list = loadCustomSources();
  list.push({ id: "CUSTOM_" + Date.now(), name, fullname: fullname || name, url, base_url: new URL(url).origin });
  saveCustomSources(list);
  renderCustomList();
  closeModal();
  alert(`✅ 已新增「${name}」\n\n注意：自訂網站清單存在瀏覽器中。若要納入自動排程，\n請將設定加入 repo 的 data/custom_sources.json 並 push。`);
}

// ── Trigger ──
function triggerAction() {
  alert(
    "手動觸發步驟：\n\n" +
    "1. 前往你的 GitHub repository\n" +
    "2. 點選上方選單「Actions」\n" +
    "3. 左側點選「每週監理報告自動抓取」\n" +
    "4. 右側點選「Run workflow」→「Run workflow」\n\n" +
    "約 3～5 分鐘後重新整理此頁面即可看到最新結果。"
  );
}

td{padding:12px 13px;border-bottom:1px solid #d4cdc0;vertical-align:top;font-size:0.85rem;line-height:1.6}

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
